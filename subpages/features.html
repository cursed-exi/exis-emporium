<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Realm of Features</title>

<link rel="icon" href="/exis-emporium/img/emporium_icon.webp" type="image/webp">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="./style.css">
</head>

<body>

<header>
    <h1><a href="./index.html">Exi's Emporium</a></h1>
    <p>The Land of the Paper Lantern Sage</p>
</header>

<div class="container">

<main>

<article class="post">

<h2>The Realm of Features</h2>

<div class="meta">
Classes, subclasses, feats and backgrounds.
</div>

<div id="feature-display">

<h3>Select a Feature</h3>

<p>
Choose a category below and browse its contents.
</p>

</div>

<hr>

<div class="note-box">

<div class="feature-type-row">

<button class="ui-button feature-type active"
data-type="Feats">
Feats
</button>

<button class="ui-button feature-type"
data-type="Classes">
Classes
</button>

<button class="ui-button feature-type"
data-type="Subclasses">
Subclasses
</button>

<button class="ui-button feature-type"
data-type="Backgrounds">
Backgrounds
</button>

</div>

<br>

<div class="feature-filter-row">

<input
id="search-bar"
class="ui-input"
type="text"
placeholder="Search features..."
>

<div class="ui-select-wrapper">

<select id="source-filter"
class="ui-select">

<option value="all">
All Sources
</option>

</select>

</div>

</div>

</div>

<div id="feature-carousel"
class="feature-carousel">
</div>

</article>

</main>

<aside id="sidebar"></aside>

</div>

<footer>
    <p>Exi's Emporium © 2026 | ExiFlow</p>
</footer>

<script src="./toolscripts/features.js"></script>
<script src="./script.js"></script>

</body>
</html>
